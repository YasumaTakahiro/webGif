<div class="filter-panel-rows">
  <div class="filter-panel-row filter-panel-row-visibility">
    <span class="filter-panel-label">表示</span>
    <div class="chip-row">
      <button
        type="button"
        class="chip {% if not visibility_hidden %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(visibility=None)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(visibility=None)) }}"
      >表示中のみ</button>
      <button
        type="button"
        class="chip {% if visibility_hidden %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(visibility='hidden')) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(visibility='hidden')) }}"
      >非表示のみ</button>
    </div>
    <p class="hint filter-visibility-hint">非表示にした画像はファイルを残したまま一覧から外れます</p>
  </div>

  <div class="filter-panel-row filter-panel-row-favorite{% if visibility_hidden %} filter-panel-row-muted{% endif %}">
    <span class="filter-panel-label">お気に入り</span>
    <div class="chip-row">
      <button
        type="button"
        class="chip {% if not favorite_only and not visibility_hidden %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(favorite=False)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(favorite=False)) }}"
      >すべて</button>
      <button
        type="button"
        class="chip {% if favorite_only %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(favorite=True)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(favorite=True)) }}"
      >お気に入りのみ</button>
    </div>
  </div>

  <div class="filter-panel-row filter-panel-row-series">
    <span class="filter-panel-label">シリーズ</span>
    <div class="chip-row">
      <button
        type="button"
        class="chip {% if not series_filter_active %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(category=None, tag=None, series_only=False, series=None)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(category=None, tag=None, series_only=False, series=None)) }}"
      >すべて</button>
      <button
        type="button"
        class="chip {% if active_series_only %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', series_only=1) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', series_only=1) }}"
      >全シリーズ</button>
      {% for s in series_list %}
        <button
          type="button"
          class="chip chip-series {% if active_series_id == s.id %}chip-active{% endif %}"
          hx-get="{{ url_for('partial_gif_list', series=s.id) }}"
          hx-target="#gif-list"
          hx-swap="innerHTML"
          hx-push-url="{{ url_for('index', series=s.id) }}"
        >{{ s.name }} <span class="count">{{ s.gif_count }}</span></button>
      {% endfor %}
    </div>
    <p class="hint filter-mode-hint">シリーズ選択時はタグ・カテゴリを無視し、番号順に表示</p>
  </div>

  <div class="filter-panel-row {% if series_filter_active %}filter-panel-row-muted{% endif %}">
    <span class="filter-panel-label">カテゴリ</span>
    <div class="chip-row">
      <button
        type="button"
        class="chip {% if not active_category and not series_filter_active %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(category=None, tag=None, series_only=False, series=None)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(category=None, tag=None, series_only=False, series=None)) }}"
      >すべて</button>
      {% for c in categories %}
        <button
          type="button"
          class="chip {% if active_category == c.id %}chip-active{% endif %}"
          hx-get="{{ url_for('partial_gif_list', **gallery_query(category=c.id, tag=None, series_only=False, series=None)) }}"
          hx-target="#gif-list"
          hx-swap="innerHTML"
          hx-push-url="{{ url_for('index', **gallery_query(category=c.id, tag=None, series_only=False, series=None)) }}"
        >{{ c.name }} <span class="count">{{ c.gif_count }}</span></button>
      {% endfor %}
    </div>
  </div>

  <div class="filter-panel-row filter-panel-row-tags {% if series_filter_active %}filter-panel-row-muted{% endif %}">
    <span class="filter-panel-label">タグ</span>
    <div class="chip-row">
      <button
        type="button"
        class="chip {% if not active_tags and not series_filter_active %}chip-active{% endif %}"
        hx-get="{{ url_for('partial_gif_list', **gallery_query(tag=[], series_only=False, series=None)) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
        hx-push-url="{{ url_for('index', **gallery_query(tag=[], series_only=False, series=None)) }}"
      >すべて</button>
      {% for t in tags %}
        {% set next_tags = active_tags | toggle_tag(t.id) %}
        <button
          type="button"
          class="chip chip-tag {% if t.id in active_tags %}chip-active{% endif %}"
          hx-get="{{ url_for('partial_gif_list', **gallery_query(tag=next_tags, series_only=False, series=None)) }}"
          hx-target="#gif-list"
          hx-swap="innerHTML"
          hx-push-url="{{ url_for('index', **gallery_query(tag=next_tags, series_only=False, series=None)) }}"
        >{{ t.name }} <span class="count">{{ t.gif_count }}</span></button>
      {% endfor %}
    </div>
    <p class="hint filter-tag-hint">複数選択可（選択したタグをすべて持つ画像）</p>
  </div>
</div>
