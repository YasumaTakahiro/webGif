<article class="gif-card gif-card-editing" id="gif-{{ gif.id }}">
  <form
    class="edit-form"
    method="post"
    action="{{ url_for('edit_gif', gif_id=gif.id, **gallery_query()) }}"
    hx-post="{{ url_for('edit_gif', gif_id=gif.id, **gallery_query()) }}"
    hx-target="#gif-{{ gif.id }}"
    hx-swap="outerHTML"
  >
    <label class="field">
      <span>タイトル</span>
      <input type="text" name="title" value="{{ gif.title or '' }}" maxlength="120">
    </label>
    <label class="field">
      <span>カテゴリ</span>
      <select name="category_id">
        <option value="">未分類</option>
        {% for c in categories %}
          <option value="{{ c.id }}" {% if gif.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>
    <fieldset class="field tag-checkboxes">
      <legend>タグ</legend>
      {% for t in tags %}
        <label class="checkbox-inline">
          <input
            type="checkbox"
            name="tag_ids"
            value="{{ t.id }}"
            {% if t.id in selected_tag_ids %}checked{% endif %}
          >
          {{ t.name }}
        </label>
      {% endfor %}
    </fieldset>
    <fieldset class="field series-fields">
      <legend>シリーズ</legend>
      <label class="field-inline">
        <span>シリーズ</span>
        <select name="series_id">
          <option value="">なし</option>
          {% for s in series_list %}
            <option value="{{ s.id }}" {% if gif.series_id == s.id %}selected{% endif %}>{{ s.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field-inline">
        <span>並び順</span>
        <input
          type="number"
          name="series_order"
          value="{{ gif.series_order or '' }}"
          min="1"
          step="1"
          placeholder="1, 2, 3…"
        >
      </label>
      {% if gif.series_id and gif.series_order %}
        <div class="series-shift-row">
          <button
            type="button"
            class="btn btn-ghost btn-small"
            hx-post="{{ url_for('shift_gif_series_order', gif_id=gif.id, **gallery_query()) }}"
            hx-vals='{"direction": "up", "refresh_list": "1"}'
            hx-target="#gif-list"
            hx-swap="innerHTML"
          >↑ 前へ</button>
          <button
            type="button"
            class="btn btn-ghost btn-small"
            hx-post="{{ url_for('shift_gif_series_order', gif_id=gif.id, **gallery_query()) }}"
            hx-vals='{"direction": "down", "refresh_list": "1"}'
            hx-target="#gif-list"
            hx-swap="innerHTML"
          >↓ 後へ</button>
        </div>
      {% endif %}
    </fieldset>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-small">保存</button>
      <button
        type="button"
        class="btn btn-ghost btn-small"
        hx-get="{{ url_for('partial_gif_list', **gallery_query()) }}"
        hx-target="#gif-list"
        hx-swap="innerHTML"
      >キャンセル</button>
    </div>
  </form>
  <img
    class="gif-image"
    src="{{ url_for('serve_upload', filename=gif.filename) }}"
    alt="{{ gif.title or 'GIF' }}"
  >
</article>
